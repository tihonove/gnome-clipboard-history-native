# nfpm — build a .deb from the prebuilt gnome-clipboard-history-native-linux-x64 binary.
# Session setup is done by the binary itself (`gnome-clipboard-history-native --install`:
# autostart, hotkey, daemon). The package only lays down the binary and STATICALLY installs
# the udev rule (uaccess) — then `--install` sees that access to /dev/uinput is already
# configured and doesn't invoke sudo. The version comes from the VERSION env (in CI — the tag without the leading v).
# Docs: https://nfpm.goreleaser.com/configuration/
name: gnome-clipboard-history-native
arch: amd64
platform: linux
version: ${VERSION}
version_schema: semver
section: utils
priority: optional
maintainer: Eugene Tihonov <tihonov.ea@gmail.com>
homepage: https://github.com/tihonove/gnome-clipboard-history-native
license: MIT
description: |
  Clipboard history (Super+Ctrl+V) for GNOME on X11 and Wayland.
  TODO: a fuller description for the store/repository.

# GTK3 — the popup; gsettings (libglib2.0-bin) — so --install can register the hotkey.
# XWayland is only needed for history under Wayland — hence recommends.
depends:
  - libgtk-3-0
  - libglib2.0-bin
recommends:
  - xwayland

contents:
  - src: ./gnome-clipboard-history-native-linux-x64
    dst: /usr/bin/gnome-clipboard-history-native
    file_info:
      mode: 0755
  # uaccess udev rule: access to /dev/uinput for the active session (Wayland pasting).
  # Placed in /usr/lib (the package's vendor path) — exactly pkgUdevRulePath from the binary,
  # so `gnome-clipboard-history-native --install` doesn't escalate; the rule is already in place.
  - src: ./packaging/udev/60-gnome-clipboard-history-native-uinput.rules
    dst: /usr/lib/udev/rules.d/60-gnome-clipboard-history-native-uinput.rules
    file_info:
      mode: 0644
  - src: ./packaging/modules-load/gnome-clipboard-history-native-uinput.conf
    dst: /usr/lib/modules-load.d/gnome-clipboard-history-native-uinput.conf
    file_info:
      mode: 0644

scripts:
  postinstall: ./packaging/scripts/postinstall.sh
  preremove: ./packaging/scripts/preremove.sh
