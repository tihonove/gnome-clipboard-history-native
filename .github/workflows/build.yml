name: Build

# Переиспользуемая сборка бинарника под Linux/x64.
# Приложение работает только на X11/GNOME — поэтому одна цель, без macOS/Windows.
# Вызывается из release.yml через workflow_call, либо вручную (workflow_dispatch).
on:
  workflow_call:
    inputs:
      version:
        description: "Версия, зашиваемая в бинарник (релиз: vX.Y.Z)"
        required: false
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Версия, зашиваемая в бинарник"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      # cgo-сборка gotk3 требует заголовков GTK3.
      - name: Install GTK dev
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          V="${{ inputs.version }}"
          V="${V#v}"                                   # срезать ведущую v из тега
          [ -z "$V" ] && V="$(cat VERSION 2>/dev/null || echo dev)"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${{ steps.ver.outputs.version }}" \
            -o clipmgr-linux-x64 .

      - uses: actions/upload-artifact@v4
        with:
          name: clipmgr-linux-x64
          path: clipmgr-linux-x64
          if-no-files-found: error
