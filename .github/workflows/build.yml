name: Build

# Reusable build of the Linux/x64 binary.
# The app runs only on X11/GNOME — hence a single target, no macOS/Windows.
# Called from release.yml via workflow_call, or manually (workflow_dispatch).
on:
  workflow_call:
    inputs:
      version:
        description: "Version baked into the binary (release: vX.Y.Z)"
        required: false
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version baked into the binary"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      # The cgo build of gotk3 requires the GTK3 headers.
      - name: Install GTK dev
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          V="${{ inputs.version }}"
          V="${V#v}"                                   # strip the leading v from the tag
          [ -z "$V" ] && V="$(cat VERSION 2>/dev/null || echo dev)"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${{ steps.ver.outputs.version }}" \
            -o gnome-clipboard-history-native-linux-x64 ./cmd/gnome-clipboard-history-native

      - uses: actions/upload-artifact@v4
        with:
          name: gnome-clipboard-history-native-linux-x64
          path: gnome-clipboard-history-native-linux-x64
          if-no-files-found: error
