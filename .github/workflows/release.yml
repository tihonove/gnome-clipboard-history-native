name: Release

# Release triggered by pushing a vX.Y.Z tag (the tag is usually created by bump-version.yml):
# build the binary, package the .deb, generate the changelog (git-cliff),
# publish a GitHub Release and publish the apt repository to gh-pages.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ github.ref_name }} # vX.Y.Z; build.yml strips the leading v

  # Build the .deb from the ready binary (nfpm). The package installs the binary + a static
  # udev rule (uaccess); the in-session setup is done by `gnome-clipboard-history-native --install`.
  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: gnome-clipboard-history-native-linux-x64 # → ./gnome-clipboard-history-native-linux-x64 (nfpm.yaml expects it here)

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build .deb
        run: |
          export VERSION="${GITHUB_REF_NAME#v}" # tag without leading v → semver
          "$(go env GOPATH)/bin/nfpm" pkg \
            --config packaging/nfpm.yaml \
            --packager deb \
            --target "gnome-clipboard-history-native_${VERSION}_amd64.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: gnome-clipboard-history-native-deb
          path: "*.deb"
          if-no-files-found: error

  # GitHub Release: binary + .deb + changelog for the latest tag.
  release:
    needs: [build, package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git-cliff needs the full history

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          # Grouping/filtering lives in cliff.toml. Only user-facing changes
          # (feat/fix/perf/security) make it into the changelog.
          config: cliff.toml
          args: --latest --strip all

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true # binary + .deb into a single folder

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: gnome-clipboard-history-native ${{ github.ref_name }}
          body: ${{ steps.cliff.outputs.content }}
          files: artifacts/*

  # Publish the .deb to the apt repository and deploy the site to GitHub Pages.
  # The gh-pages branch is ONLY reprepro's persistent state (pool/db/dists accumulate there);
  # the site is served via an Actions deploy (build_type=workflow), NOT by serving the branch.
  # A single job does it all: reprepro → push state to gh-pages → upload+deploy the artifact.
  apt-repo:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write # git push state to the gh-pages branch
      pages: write # actions/deploy-pages
      id-token: write # OIDC for actions/deploy-pages
    # One active Pages deploy at a time (releases are sequential anyway).
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4 # main: templates from packaging/apt

      - name: Download .deb
        uses: actions/download-artifact@v4
        with:
          name: gnome-clipboard-history-native-deb
          path: debs

      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      - name: Import signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$APT_GPG_PRIVATE_KEY" ]; then
            echo "::error::secret APT_GPG_PRIVATE_KEY is not set — cannot sign the repository." >&2
            exit 1
          fi
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          FPR=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')
          echo "FPR=$FPR" >> "$GITHUB_ENV"

      - name: Assemble & sign repository
        run: |
          # Fetch the current repository tree (on the first release, create an empty one).
          if git clone --depth 1 --branch gh-pages \
               "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}" pages; then
            echo "gh-pages fetched"
          else
            echo "gh-pages missing — initializing"
            mkdir pages && (cd pages && git init -b gh-pages)
          fi

          # conf/distributions with the real signing fingerprint.
          mkdir -p pages/conf
          sed "s/__FINGERPRINT__/${FPR}/" packaging/apt/conf/distributions > pages/conf/distributions

          # Static files: installers (apt + standalone) + the public key.
          cp packaging/apt/install.sh packaging/apt/install-standalone.sh pages/
          gpg --export "${FPR}" > pages/gnome-clipboard-history-native-archive-keyring.gpg

          # Add the package to the stable/main component (Release is signed automatically).
          reprepro -b pages includedeb stable debs/*.deb
          reprepro -b pages list stable

      # Push the updated reprepro state to gh-pages (state store, not serving).
      # No-op tolerant: re-running the same tag / a repeated deb doesn't change the tree — that's OK,
      # not an error (an empty `git commit` used to fail the whole job).
      - name: Publish gh-pages state
        run: |
          cd pages
          git add -A
          if git diff --cached --quiet; then
            echo "apt repository unchanged — no push needed (we deploy anyway)"
          else
            git -c user.name="github-actions[bot]" \
                -c user.email="github-actions[bot]@users.noreply.github.com" \
                commit -m "apt: publish ${GITHUB_REF_NAME}"
            git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}" \
                HEAD:gh-pages
          fi

      # Build the served tree: only what apt clients need
      # (dists/ + pool/) plus the static files. reprepro internals (conf/, db/) and .git are NOT served.
      - name: Assemble servable site
        run: |
          mkdir _site
          rsync -a --exclude='.git' --exclude='conf' --exclude='db' --exclude='_site' \
            pages/ _site/

      # Synchronous deploy via Actions (build_type=workflow) — the status is visible in THIS
      # run, without a separate flaky "pages build and deployment" workflow.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
