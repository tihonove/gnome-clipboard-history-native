name: Release

# Релиз по пушу тега vX.Y.Z (тег обычно создаёт bump-version.yml):
# собрать бинарник, упаковать .deb, сгенерировать changelog (git-cliff),
# выложить GitHub Release и опубликовать apt-репозиторий на gh-pages.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ github.ref_name }} # vX.Y.Z; build.yml срежет ведущую v

  # Собрать .deb из готового бинарника (nfpm). Пакет кладёт бинарник + статическое
  # udev-правило (uaccess); установку в сессии делает `gnome-clipboard-history-native --install`.
  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: gnome-clipboard-history-native-linux-x64 # → ./gnome-clipboard-history-native-linux-x64 (nfpm.yaml ждёт его тут)

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build .deb
        run: |
          export VERSION="${GITHUB_REF_NAME#v}" # тег без ведущей v → semver
          "$(go env GOPATH)/bin/nfpm" pkg \
            --config packaging/nfpm.yaml \
            --packager deb \
            --target "gnome-clipboard-history-native_${VERSION}_amd64.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: gnome-clipboard-history-native-deb
          path: "*.deb"
          if-no-files-found: error

  # GitHub Release: бинарник + .deb + changelog за последний тег.
  release:
    needs: [build, package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git-cliff нужна вся история

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          # Группировка/фильтрация — в cliff.toml. В changelog попадают только
          # пользовательские изменения (feat/fix/perf/security).
          config: cliff.toml
          args: --latest --strip all

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true # бинарник + .deb в одну папку

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: gnome-clipboard-history-native ${{ github.ref_name }}
          body: ${{ steps.cliff.outputs.content }}
          files: artifacts/*

  # Опубликовать .deb в apt-репозиторий и задеплоить сайт на GitHub Pages.
  # Ветка gh-pages — ТОЛЬКО персистентное состояние reprepro (pool/db/dists копятся);
  # обслуживание сайта — через Actions-деплой (build_type=workflow), НЕ сервинг ветки.
  # Одна джоба делает всё: reprepro → push состояния в gh-pages → upload+deploy артефакта.
  apt-repo:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write # git push состояния в ветку gh-pages
      pages: write # actions/deploy-pages
      id-token: write # OIDC для actions/deploy-pages
    # Один активный деплой Pages за раз (релизы и так последовательны).
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4 # main: шаблоны из packaging/apt

      - name: Download .deb
        uses: actions/download-artifact@v4
        with:
          name: gnome-clipboard-history-native-deb
          path: debs

      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      - name: Import signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$APT_GPG_PRIVATE_KEY" ]; then
            echo "::error::secret APT_GPG_PRIVATE_KEY не задан — репозиторий не подписать." >&2
            exit 1
          fi
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          FPR=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')
          echo "FPR=$FPR" >> "$GITHUB_ENV"

      - name: Assemble & sign repository
        run: |
          # Забрать текущее дерево репозитория (первый релиз — создать пустое).
          if git clone --depth 1 --branch gh-pages \
               "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}" pages; then
            echo "gh-pages подтянут"
          else
            echo "gh-pages нет — инициализирую"
            mkdir pages && (cd pages && git init -b gh-pages)
          fi

          # conf/distributions с реальным fingerprint подписи.
          mkdir -p pages/conf
          sed "s/__FINGERPRINT__/${FPR}/" packaging/apt/conf/distributions > pages/conf/distributions

          # Статика: установщики (apt + standalone) + публичный ключ.
          cp packaging/apt/install.sh packaging/apt/install-standalone.sh pages/
          gpg --export "${FPR}" > pages/gnome-clipboard-history-native-archive-keyring.gpg

          # Добавить пакет в компонент stable/main (подпись Release автоматом).
          reprepro -b pages includedeb stable debs/*.deb
          reprepro -b pages list stable

      # Запушить обновлённое состояние reprepro в gh-pages (стейт-стор, не сервинг).
      # No-op-терпимо: ре-ран того же тега / повторный deb не меняют дерево — это ОК,
      # а не ошибка (раньше пустой `git commit` ронял всю джобу).
      - name: Publish gh-pages state
        run: |
          cd pages
          git add -A
          if git diff --cached --quiet; then
            echo "apt-репозиторий без изменений — пуш не нужен (деплой всё равно выполним)"
          else
            git -c user.name="github-actions[bot]" \
                -c user.email="github-actions[bot]@users.noreply.github.com" \
                commit -m "apt: publish ${GITHUB_REF_NAME}"
            git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}" \
                HEAD:gh-pages
          fi

      # Собрать обслуживаемое дерево: только то, что нужно клиентам apt
      # (dists/ + pool/) и статика. Внутренности reprepro (conf/, db/) и .git НЕ сервим.
      - name: Assemble servable site
        run: |
          mkdir _site
          rsync -a --exclude='.git' --exclude='conf' --exclude='db' --exclude='_site' \
            pages/ _site/

      # Синхронный деплой через Actions (build_type=workflow) — статус виден в ЭТОМ
      # прогоне, без отдельного флакающего воркфлоу «pages build and deployment».
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
