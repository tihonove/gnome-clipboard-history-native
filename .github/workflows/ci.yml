name: CI

# Проверка сборки на пуш в main и на PR.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install GTK dev
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      - run: go vet ./...
      - run: go build ./...

      # Линтер после установки libgtk-3-dev: cgo-тайпчек требует заголовков GTK.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
