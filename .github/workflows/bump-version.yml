name: Bump Version

# Поднимает версию в файле VERSION, коммитит chore(release): vX.Y.Z и пушит тег.
# Пуш тега, в свою очередь, триггерит release.yml.
on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Нужен PAT (не дефолтный GITHUB_TOKEN), иначе пуш тега не запустит
          # release.yml (защита от рекурсии воркфлоу). Секрет REPOSITORY_PAT —
          # personal access token с правом contents:write.
          token: ${{ secrets.REPOSITORY_PAT }}

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump VERSION and tag
        run: |
          cur="$(cat VERSION)"
          IFS=. read -r MA MI PA <<< "$cur"
          case "${{ github.event.inputs.bump_type }}" in
            major) MA=$((MA + 1)); MI=0; PA=0 ;;
            minor) MI=$((MI + 1)); PA=0 ;;
            patch) PA=$((PA + 1)) ;;
          esac
          new="$MA.$MI.$PA"
          echo "$new" > VERSION
          git add VERSION
          git commit -m "chore(release): v$new"
          # Аннотированный тег: git push --follow-tags пушит только их (лёгкие — нет).
          git tag -a "v$new" -m "v$new"

      - name: Push commit and tag
        run: git push origin HEAD --follow-tags
