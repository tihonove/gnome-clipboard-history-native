name: Deploy Pages (manual)

# Manual redeploy of the apt repository's current state from the gh-pages branch to Pages
# via Actions (build_type=workflow), without a new release. Needed for:
#  - a one-time cutover deploy when switching legacy → workflow (so the site doesn't go down);
#  - an emergency redeploy if the live site has diverged from the gh-pages branch.
# The regular release deploy is done by release.yml (the apt-repo job) — this workflow does NOT duplicate it.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      # Serve only dists/ + pool/ + static files; conf/, db/, and .git are not served.
      - name: Assemble servable site
        run: |
          mkdir _site
          rsync -a --exclude='.git' --exclude='conf' --exclude='db' --exclude='_site' \
            ./ _site/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
