# golangci-lint config (v2 format). Run: golangci-lint run
version: "2"

linters:
  # standard set: errcheck, govet, ineffassign, staticcheck, unused
  default: standard
  enable:
    - misspell
  settings:
    errcheck:
      # Fire-and-forget by design: best-effort calls where there's nothing
      # meaningful to do with the error (socket "rings", gsettings, X requests,
      # kernel writes to uinput). Reply() on an xgb cookie is a synchronizing round-trip;
      # the result isn't needed.
      exclude-functions:
        - (net.Conn).Write
        - (net.Conn).Close
        - (*os.File).Close
        - os.MkdirAll
        - os.Remove
        - (*os/exec.Cmd).Run
        - (github.com/jezek/xgb/xproto.GetInputFocusCookie).Reply
        - (github.com/jezek/xgb/xfixes.QueryVersionCookie).Reply
        # gdk-pixbuf loader Close: the pixbuf is already obtained from WriteAndReturnPixbuf
        - (*github.com/gotk3/gotk3/gdk.PixbufLoader).Close

formatters:
  enable:
    - gofmt
