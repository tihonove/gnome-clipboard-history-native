# git-cliff config for gnome-clipboard-history-native.
# Goal: the changelog shows only user-facing changes.
# Infrastructure (CI, build, tests, refactoring, docs, style) is hidden from the changelog.
# The commit convention this relies on is described in CLAUDE.md (the "Commits" section).

[changelog]
header = ""
body = """
{% for commit in commits | filter(attribute="breaking", value=true) %}\
{% if loop.first %}### 💥 Breaking Changes
{% endif %}\
- {{ commit.message | split(pat="\n") | first | upper_first | trim }}
{% endfor %}\
{% for group, commits in commits | group_by(attribute="group") %}\
{% if group is starting_with("<!--") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {{ commit.message | split(pat="\n") | first | upper_first | trim }}
{% endfor %}\
{% endif %}\
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
protect_breaking_commits = true
filter_commits = true
commit_parsers = [
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps", skip = true },
  { message = "^\\w+\\(security\\)", group = "<!-- 0 -->🛡️ Security" },
  { body = ".*[Ss]ecurity", group = "<!-- 0 -->🛡️ Security" },
  { message = "^feat", group = "<!-- 1 -->🚀 Features" },
  { message = "^fix", group = "<!-- 2 -->🐛 Bug Fixes" },
  { message = "^perf", group = "<!-- 3 -->⚡ Performance" },
  { message = ".*", skip = true },
]
tag_pattern = "v[0-9]*"
